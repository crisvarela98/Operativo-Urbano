version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: operativo-urbano-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: operativo-urbano
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - operativo-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin -u admin -p admin123 --quiet
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: operativo-urbano-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/operativo-urbano?authSource=admin
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      SERVER_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:8080
      SOCKET_IO_CORS: http://localhost:8080
      LOG_LEVEL: debug
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
    networks:
      - operativo-network
    command: npm run dev

volumes:
  mongodb_data:
  mongodb_config:

networks:
  operativo-network:
    driver: bridge
